<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Happy Birthday Mom ❤️</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INTRO SCREEN -->

<section id="intro" class="intro-screen">

    <div class="text-center">

        <h1 class="display-2 fw-bold">
            Happy Birthday Mom ❤️
        </h1>

        <p class="lead mt-3">
            We have a little surprise for you...
        </p>

        <button
            id="startBtn"
            class="btn btn-danger btn-lg mt-4">
            ▶ Play Surprise
        </button>

        <br>

        <button
            id="scrollBtn"
            class="btn btn-outline-secondary mt-3">
            ↓ View Messages
        </button>

    </div>

</section>

<!-- INTRO VIDEO MODAL -->

<div class="modal fade"
     id="introVideoModal"
     tabindex="-1">

    <div class="modal-dialog modal-fullscreen">

        <div class="modal-content bg-black">

            <div class="modal-header border-0">

                <button
                    id="closeIntroBtn"
                    type="button"
                    class="btn-close btn-close-white">
                </button>

            </div>

            <div class="modal-body p-0">

                <iframe
                    id="introVideo"
                    class="w-100 h-100"
                    src=""
                    allow="autoplay; fullscreen"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen>
                </iframe>

            </div>

        </div>

    </div>

</div>

<!-- MAIN CONTENT -->

<section id="gallerySection" class="container py-5 d-none">

    <h1 class="text-center mb-5">
        Happy Birthday Mom 🥳
    </h1>

    <div id="videoGrid" class="row g-1">
    </div>

</section>

<!-- VIDEO MODAL -->

<div class="modal fade"
     id="videoModal"
     tabindex="-1">

    <div class="modal-dialog modal-fullscreen">

        <div class="modal-content bg-black">

            <div class="modal-header border-0">

                <button
                    type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body p-0">

                <iframe
                    id="playerFrame"
                    class="w-100 h-100"
                    src=""
                    allow="autoplay; fullscreen"
                    allowfullscreen>
                </iframe>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
